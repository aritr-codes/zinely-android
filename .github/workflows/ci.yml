name: CI

# Runs the pure-Kotlin core test suites on every push to main and every PR. The Android `:app`
# module is excluded via ZINELY_CORE_ONLY (see settings.gradle.kts) so CI needs no Android SDK —
# Android-backed modules get their own SDK-provisioned job when S2B lands.
on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core-tests:
    name: Pure-Kotlin core tests (JVM)
    runs-on: ubuntu-latest
    env:
      ZINELY_CORE_ONLY: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run core module tests
        run: |
          chmod +x ./gradlew
          ./gradlew :core:model:test :core:imposition:test :core:data:test --no-daemon --stacktrace

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-test-results
          path: '**/build/test-results/test/*.xml'
          if-no-files-found: warn
