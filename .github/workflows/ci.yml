name: CI

# Two jobs run on every push to main and every PR:
#   * core-tests      — pure-Kotlin core suites with ZINELY_CORE_ONLY=true (no Android SDK needed).
#   * android-graph   — SDK-provisioned; with ZINELY_CORE_ONLY UNSET it compiles :app (and runs the
#                       :data-android JVM tests), which is where Hilt/KSP validates the whole
#                       SingletonComponent graph. This is the PR-A Step 7 acceptance gate
#                       (docs/spikes/pr-a-step-7-hilt-di.md §13.1): before it, the Android/Hilt graph
#                       was never compiled in CI, so a broken binding could merge undetected.
on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core-tests:
    name: Pure-Kotlin core tests (JVM)
    runs-on: ubuntu-latest
    env:
      ZINELY_CORE_ONLY: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run core module tests
        run: |
          chmod +x ./gradlew
          ./gradlew :core:model:test :core:imposition:test :core:render:test :core:data:test :core:data-storage:test :core:editor:test --no-daemon --stacktrace

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-test-results
          path: '**/build/test-results/test/*.xml'
          if-no-files-found: warn

  android-graph:
    name: Android Hilt graph validation (SDK)
    # Pinned image (not ubuntu-latest): this job VERIFIES the Roborazzi goldens, which are only valid
    # against the image they were recorded on (ADR-028 §7.5). The record-goldens.yml workflow pins the
    # SAME ubuntu-24.04 + UTC/en_US so a verify never drifts against the recorded raster.
    runs-on: ubuntu-24.04
    # ZINELY_CORE_ONLY is intentionally UNSET here so settings.gradle.kts includes :app and
    # :data-android — the only configuration in which the Hilt graph is compiled and validated.
    env:
      TZ: UTC
      LANG: en_US.UTF-8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate Hilt graph (compile :app) + run :data-android, :render-android & :feature:editor JVM tests
        # :app:compileDebugKotlin is the minimum graph gate (KSP/Hilt run during Kotlin compilation
        # and fail the build on any missing/duplicate/cyclic binding). :data-android:testDebugUnitTest
        # is the justified stronger equivalent — it additionally runs the pure-JVM binding tests
        # (@AutosaveScope shape, EditorAutosaveBinderFactory wiring) in the same SDK-provisioned job.
        #
        # :render-android (ADR-028 S3): the Robolectric NATIVE unit proofs run in the next step via
        # verifyRoborazziDebug (which runs testDebugUnitTest in verify mode — real-Skia raster provider +
        # replayer/transform conformance + the G6a RasterGoldenTest cases + api(:core:render) edge). The
        # PDF write+rasterise proof AND the real-PNG image-fidelity proof (ImageReplayInstrumentedTest)
        # cannot run under Robolectric NATIVE (PdfDocument generation and BitmapRegionDecoder region
        # decode are both unsupported), so they live in src/androidTest and run on a device —
        # compileDebugAndroidTestKotlin compile-checks them here (no emulator), so they can't bitrot.
        # :core:render itself stays in the core-only job — pure, Android-free.
        #
        # :feature:editor (ADR-028 S4): the Compose preview host. Its NATIVE unit suite is the
        # preview==export parity gate (PagePreviewParityTest: host raster == direct CanvasReplayer replay,
        # fills EXACT / AA edges <= 0.02, text via the bundled font resolver) PLUS the S4 selection-chrome
        # goldens (ADR-029 §5). The chrome layers draw in Compose screen space — not in the pure tape — so
        # parity cannot cover them; they are pinned by committed Roborazzi goldens instead. Both run in the
        # verify step below (verifyRoborazziDebug runs testDebugUnitTest in verify mode). No consumer module
        # depends on :feature:editor yet, so that verify step is what actually gates it in CI.
        run: |
          chmod +x ./gradlew
          ./gradlew :app:compileDebugKotlin :data-android:testDebugUnitTest \
            :render-android:compileDebugAndroidTestKotlin \
            --no-daemon --stacktrace

      - name: Verify :render-android + :feature:editor Roborazzi goldens + NATIVE unit proofs
        # verifyRoborazziDebug runs each module's testDebugUnitTest in verify mode: all NATIVE unit tests
        # PLUS the committed golden pixel-diffs (render-android/src/test/roborazzi/ — the G6a raster
        # goldens; feature/editor/src/test/roborazzi/ — the S4 selection-chrome goldens). --rerun-tasks
        # defeats the up-to-date skip: the source-tree goldens are not a tracked task input, so without it
        # a cached verify could pass without actually comparing.
        #
        # ORDERING (record-then-verify, ADR-028 §7.5): the feature/editor goldens are produced by the
        # record-goldens.yml workflow on this pinned image and committed under feature/editor/src/test/
        # roborazzi/. This step is RED until those PNGs are committed — that transient is the deliberate,
        # reviewed golden-landing dance, not drift.
        run: |
          ./gradlew :render-android:verifyRoborazziDebug :feature:editor:verifyRoborazziDebug \
            --rerun-tasks --no-daemon --stacktrace

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-graph-test-results
          path: |
            data-android/build/test-results/testDebugUnitTest/*.xml
            render-android/build/test-results/testDebugUnitTest/*.xml
            feature/editor/build/test-results/testDebugUnitTest/*.xml
          if-no-files-found: warn

      # On a Roborazzi verify failure, the actual/compare/diff PNGs let a reviewer see the drift
      # (ADR-028 §7.3) instead of guessing from a pixel-count delta. Only present when verify fails.
      - name: Upload Roborazzi compare images on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: roborazzi-compare-images
          path: |
            render-android/build/outputs/roborazzi/**
            feature/editor/build/outputs/roborazzi/**
          if-no-files-found: ignore
