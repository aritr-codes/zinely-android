# Pinned Robolectric config for the :feature:editor preview-host parity tier (ADR-028 §7.1/§7.5).
# Mirrors :render-android/src/test/resources/robolectric.properties so the preview host's parity
# proofs rasterise on the SAME baseline as the export-side goldens — SDK/graphics behaviour cannot
# drift between the two paths the parity test compares.
#
# graphicsMode=NATIVE routes Canvas / StaticLayout through real native Skia instead of Robolectric's
# legacy placeholder glyphs — the hard prerequisite for a pixel-accurate preview==export proof.
# Without it, text rasters are fake and the §4.2 bundled-font wiring proof would be meaningless.
#
# sdk is pinned (not "target the compileSdk") because committed goldens are only valid against a
# fixed SDK raster; a bump is a deliberate, reviewed re-record (spike §7.5), never ambient drift.
# 34 matches :render-android exactly.
graphicsMode=NATIVE
sdk=34
