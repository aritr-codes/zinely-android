# Pinned Robolectric config for the :render-android visual-fidelity tier (ADR-028, spike §7.1/§7.5).
#
# graphicsMode=NATIVE routes Canvas / StaticLayout / PdfDocument through real native Skia instead of
# Robolectric's legacy placeholder glyphs — the hard prerequisite for any pixel-accurate preview==export
# golden diff. Without it, text rasters are fake and parity proofs are meaningless.
#
# sdk is pinned (not "target the compileSdk") because committed goldens are only valid against a fixed
# SDK raster; a bump is a deliberate, reviewed re-record (spike §7.5), never ambient drift. 34 is a
# stable Robolectric-supported level; revisit at G6 when the first goldens are recorded.
graphicsMode=NATIVE
sdk=34
